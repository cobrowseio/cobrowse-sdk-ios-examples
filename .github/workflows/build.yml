name: Verify app builds

on:
  workflow_dispatch:
  
  pull_request:
    branches: [ master ]
    paths-ignore: 
      - '.gitignore'
      - 'LICENSE.md'
      - 'README.md'
      - 'Cobrowse/WebContent/**'

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode version
        uses: ./.github/actions/select-xcode-version

      - name: Build the app
        run: |
          xcodebuild -project Cobrowse.xcodeproj \
            -scheme Cobrowse \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "./build" \
            build | xcpretty && exit ${PIPESTATUS[0]}

      - name: Create app archive
        run: tar -czf Cobrowse.app.tar.gz build/Build/Products/Debug-iphonesimulator/Cobrowse.app

      - name: Build the app (SwiftUI)
        run: |
          xcodebuild -project Cobrowse.xcodeproj \
           -scheme "Cobrowse - SwiftUI" \
           -sdk iphonesimulator \
           -destination "generic/platform=iOS Simulator" \
           -derivedDataPath "./build" \
           build | xcpretty && exit ${PIPESTATUS[0]}

      - name: Create app archive (SwiftUI)
        run: tar -czf Cobrowse.app.tar.gz "build/Build/Products/Debug-iphonesimulator/Cobrowse - SwiftUI.app"
