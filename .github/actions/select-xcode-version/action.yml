name: Select Xcode version
description: Select the Xcode version to be used to compile the apps

runs:
  using: "composite"
  steps:
    - name: Select Xcode version
      env:
        XCODE_SELECTED_PATH: "/Applications/Xcode_26.0.app"
      shell: bash
      run: |
        sudo xcode-select --switch ${XCODE_SELECTED_PATH}
        xcodebuild -version

    - name: Download the iOS runtime
      shell: bash
      run: |
        xcrun simctl list > /dev/null
        xcrun xcodebuild -downloadPlatform iOS

    - name: Warm up Xcode
      shell: bash
      run: |
        xcode-select -p
        xcodebuild -version
        sudo xcodebuild -runFirstLaunch
        sudo xcodebuild -license accept
